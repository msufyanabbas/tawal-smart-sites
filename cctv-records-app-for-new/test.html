    // -----------------------------------------------------------------
    // 2. RENDER THE SVG
    // -----------------------------------------------------------------
    const data = rawData.json;
    const rooms = data.rooms || [];
    const walls = data.walls || [];

    // Collect all points to set bounding box
    const allPoints = [];
    rooms.forEach(room => room.boundaries?.forEach(p => allPoints.push(p)));
    walls.forEach(wall => wall.points?.forEach(p => allPoints.push(p)));

    if (allPoints.length === 0) {
        document.getElementById('map-svg').innerHTML = '<text x="10" y="30" font-family="sans-serif">No geometry</text>';
    } else {
        let minX = Infinity, minY = Infinity;
        let maxX = -Infinity, maxY = -Infinity;
        allPoints.forEach(p => {
            if (p.x < minX) minX = p.x;
            if (p.y < minY) minY = p.y;
            if (p.x > maxX) maxX = p.x;
            if (p.y > maxY) maxY = p.y;
        });

        // Add padding
        const pad = 5;
        const viewBox = `${minX - pad} ${minY - pad} ${maxX - minX + 2 * pad} ${maxY - minY + 2 * pad}`;
        const svg = document.getElementById('map-svg');
        svg.setAttribute('viewBox', viewBox);

        // Helper to get centroid
        const getCentroid = (pts) => {
            let cx = 0, cy = 0;
            pts.forEach(p => { cx += p.x; cy += p.y; });
            return { x: cx / pts.length, y: cy / pts.length };
        };

        let svgContent = '';

        // --- Walls ---
        walls.forEach(wall => {
            const pts = wall.points || [];
            if (pts.length < 2) return;
            const pointsStr = pts.map(p => `${p.x},${p.y}`).join(' ');
            // Scale thickness so it's visible in the overall drawing
            const thickness = Math.max(wall.thickness * 5, 0.5);
            const color = wall.material === 'A-DOOR' ? '#e74c3c' : '#2c3e50';
            svgContent += `<polyline points="${pointsStr}" fill="none" stroke="${color}" stroke-width="${thickness}" stroke-linejoin="round" stroke-linecap="round" />`;
        });

        // --- Rooms ---
        rooms.forEach(room => {
            const pts = room.boundaries || [];
            if (pts.length < 3) return;
            const pointsStr = pts.map(p => `${p.x},${p.y}`).join(' ');
            // Derive a color from id
            const idNum = parseInt(room.id.replace(/\D/g,'')) || 0;
            const hue = (idNum * 37) % 360;
            svgContent += `<polygon points="${pointsStr}" fill="hsla(${hue}, 70%, 80%, 0.5)" stroke="#1a5276" stroke-width="0.8" stroke-linejoin="round" />`;
        });

        // --- Labels (first line of name) ---
        rooms.forEach(room => {
            const pts = room.boundaries || [];
            if (pts.length < 3) return;
            const c = getCentroid(pts);
            const label = room.name?.split('\n')[0] || room.id;
            // Shorten very long labels to fit
            const shortLabel = label.length > 25 ? label.slice(0, 22) + '…' : label;
            svgContent += `<text x="${c.x}" y="${c.y}" font-size="2.2" fill="#111" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" style="pointer-events:none; font-weight:500; text-shadow: 0 0 4px white, 0 0 4px white;">${shortLabel}</text>`;
        });

        svg.innerHTML = svgContent;
    }

# Web tier for cctv-records-web.
# This file is dropped into /etc/nginx/conf.d/ inside the image and is the only
# server{} block active. It does two jobs:
#   1. Serve the React SPA from /usr/share/nginx/html and fall back to index.html
#      so client-side routes (e.g. /sites/:id/edit) work on full-page reloads.
#   2. Proxy /api/* to the NestJS backend running inside the compose network.

server {
    listen       80;
    server_name  _;

    # Where the built React bundle lives (copied in the Dockerfile).
    root   /usr/share/nginx/html;
    index  index.html;

    # Standard hardening + perf headers.
    server_tokens off;
    add_header X-Frame-Options          "SAMEORIGIN" always;
    add_header X-Content-Type-Options   "nosniff"    always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # Gzip text assets — small, safe defaults.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Cache hashed assets aggressively (Vite emits content-hashed filenames).
    location /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy API calls to the backend service. The trailing slash on both the
    # location and proxy_pass strips the /api prefix before forwarding, so the
    # browser hits /api/sites but Nest sees /sites — which matches the existing
    # controller routes that are not prefixed with /api.
    location /api/ {
        proxy_pass         http://backend:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        # Report endpoint generates an Excel file — allow plenty of time.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        # 10 MB matches bodyParser limit in src/main.ts (base64 image uploads).
        client_max_body_size 10m;
    }

    # SPA fallback — every unknown path returns index.html so React Router
    # can render the right page client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't log every favicon miss.
    location = /favicon.ico { log_not_found off; access_log off; }
    location = /robots.txt  { log_not_found off; access_log off; }
}
